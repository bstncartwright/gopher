name: pr-tests

on:
  pull_request:
    branches:
      - main
  merge_group:

permissions:
  contents: read

jobs:
  lint-gofmt:
    name: lint-gofmt
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: verify gofmt
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "these files are not gofmt-formatted:"
            echo "$files"
            exit 1
          fi

  lint-vet:
    name: lint-go-vet
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: run go vet
        run: go vet ./...

  lint-staticcheck:
    name: lint-staticcheck
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@v0.6.1

      - name: run staticcheck on changed packages
        run: |
          base_ref="${GITHUB_BASE_REF:-main}"
          git fetch --no-tags --depth=1 origin "${base_ref}"
          changed_files="$(git diff --name-only "origin/${base_ref}...HEAD" -- '*.go')"
          if [ -z "${changed_files}" ]; then
            echo "no go file changes; skipping staticcheck"
            exit 0
          fi
          changed_dirs="$(printf '%s\n' "${changed_files}" | xargs -n1 dirname | sort -u)"
          changed_pkgs=()
          while IFS= read -r dir; do
            [ -z "${dir}" ] && continue
            pkg="$(go list "./${dir}" 2>/dev/null || true)"
            [ -z "${pkg}" ] && continue
            changed_pkgs+=("${pkg}")
          done <<< "${changed_dirs}"
          if [ "${#changed_pkgs[@]}" -eq 0 ]; then
            echo "no go packages resolved from changed files; skipping staticcheck"
            exit 0
          fi
          echo "running staticcheck on: ${changed_pkgs[*]}"
          staticcheck "${changed_pkgs[@]}"

  lint-mod:
    name: lint-go-mod
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: verify go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  lint-workflows:
    name: lint-workflows
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: run actionlint
        uses: rhysd/actionlint@v1.7.11

  test:
    name: go-test
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: run go tests
        run: go test ./...
