name: pr-tests

on:
  pull_request:
    branches:
      - main
  merge_group:

permissions:
  contents: read

jobs:
  lint-gofmt:
    name: lint-gofmt
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: verify gofmt
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "these files are not gofmt-formatted:"
            echo "$files"
            exit 1
          fi

  lint-vet:
    name: lint-go-vet
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: run go vet
        run: go vet ./...

  lint-staticcheck:
    name: lint-staticcheck
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: run staticcheck
        run: staticcheck ./...

  lint-mod:
    name: lint-go-mod
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: verify go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  lint-workflows:
    name: lint-workflows
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: run actionlint
        uses: rhysd/actionlint@v1

  test:
    name: go-test
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: run go tests
        run: go test ./...
