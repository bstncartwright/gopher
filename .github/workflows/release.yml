name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "release tag (example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: build-linux-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: run tests
        run: go test ./...

      - name: build binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          output="dist/gopher-linux-${{ matrix.goarch }}"
          go build -trimpath -ldflags="-s -w" -o "${output}" ./cmd/gopher
          sha256sum "${output}" > "${output}.sha256"

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    name: publish-release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: determine tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          tag="${INPUT_TAG}"
          if [ -z "${tag}" ]; then
            tag="${REF_NAME}"
          fi
          if [ -z "${tag}" ]; then
            echo "release tag is required"
            exit 1
          fi
          case "${tag}" in
            v*) ;;
            *)
              echo "release tag must start with v (got: ${tag})"
              exit 1
              ;;
          esac
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: prepare release files
        run: |
          mkdir -p release
          cp dist/release-linux-amd64/gopher-linux-amd64 release/
          cp dist/release-linux-arm64/gopher-linux-arm64 release/
          cat dist/release-linux-amd64/gopher-linux-amd64.sha256 dist/release-linux-arm64/gopher-linux-arm64.sha256 > release/checksums.txt

      - name: create github release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: |
            release/gopher-linux-amd64
            release/gopher-linux-arm64
            release/checksums.txt
