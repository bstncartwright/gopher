name: release

on:
  push:
    branches:
      - "main"

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  prepare:
    name: prepare-release-tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: determine next tag
        id: tag
        run: |
          set -euo pipefail
          git fetch --tags --force

          latest="$(git tag -l 'v*' --sort=-v:refname | head -n 1)"
          if [ -z "${latest}" ]; then
            major=0
            minor=1
            patch=0
          else
            case "${latest}" in
              v[0-9]*.[0-9]*.[0-9]*) ;;
              *)
                echo "latest release tag must be semver (vX.Y.Z), got: ${latest}"
                exit 1
                ;;
            esac
            version="${latest#v}"
            major="${version%%.*}"
            rest="${version#*.}"
            minor="${rest%%.*}"
            patch="${rest##*.}"
            patch=$((patch + 1))
          fi

          candidate="v${major}.${minor}.${patch}"
          while git rev-parse -q --verify "refs/tags/${candidate}" >/dev/null; do
            patch=$((patch + 1))
            candidate="v${major}.${minor}.${patch}"
          done

          echo "tag=${candidate}" >> "$GITHUB_OUTPUT"

  build:
    name: build-linux-${{ matrix.goarch }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch:
          - amd64
          # - arm64 # temporarily disabled; keep for later re-enable
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: refresh model catalog
        run: go run ./cmd/modelcataloggen -out ./pkg/ai/models_generated.go

      - name: run tests
        run: go test ./...

      - name: build binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          VERSION_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          mkdir -p dist
          output="dist/gopher-linux-${{ matrix.goarch }}"
          go build -trimpath -ldflags="-s -w -X main.binaryVersion=${VERSION_TAG}" -o "${output}" ./cmd/gopher
          sha256sum "${output}" > "${output}.sha256"

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    name: publish-release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: prepare release files
        run: |
          mkdir -p release
          cp dist/release-linux-amd64/gopher-linux-amd64 release/
          # cp dist/release-linux-arm64/gopher-linux-arm64 release/ # temporarily disabled
          cat dist/release-linux-amd64/gopher-linux-amd64.sha256 > release/checksums.txt

      - name: create github release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ github.sha }}
          # Add release/gopher-linux-arm64 back when arm64 build is re-enabled.
          files: |
            release/gopher-linux-amd64
            release/checksums.txt
