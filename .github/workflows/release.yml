name: release

on:
  push:
    branches:
      - "main"

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  prepare:
    name: prepare-release-tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: determine next tag
        id: tag
        run: |
          set -euo pipefail
          git fetch --tags --force

          latest="$(git tag -l 'v*' --sort=-v:refname | head -n 1)"
          if [ -z "${latest}" ]; then
            major=0
            minor=1
            patch=0
          else
            case "${latest}" in
              v[0-9]*.[0-9]*.[0-9]*) ;;
              *)
                echo "latest release tag must be semver (vX.Y.Z), got: ${latest}"
                exit 1
                ;;
            esac
            version="${latest#v}"
            major="${version%%.*}"
            rest="${version#*.}"
            minor="${rest%%.*}"
            patch="${rest##*.}"
            patch=$((patch + 1))
          fi

          candidate="v${major}.${minor}.${patch}"
          while git rev-parse -q --verify "refs/tags/${candidate}" >/dev/null; do
            patch=$((patch + 1))
            candidate="v${major}.${minor}.${patch}"
          done

          echo "tag=${candidate}" >> "$GITHUB_OUTPUT"

  build:
    name: build-${{ matrix.goos }}-${{ matrix.goarch }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.1

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: "latest"
          cache: "npm"
          cache-dependency-path: frontend/admin/package-lock.json

      - name: build frontend
        run: npm ci && npm run build
        working-directory: frontend/admin

      - name: refresh model catalog
        run: go run ./cmd/modelcataloggen -out ./pkg/ai/models_generated.go

      - name: generate spa assets
        run: go generate ./pkg/panel/...

      - name: run tests
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: go test ./...

      - name: build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          mkdir -p out
          output="out/gopher-${GOOS}-${GOARCH}"
          go build -trimpath -ldflags="-s -w -X main.binaryVersion=${VERSION_TAG}" -o "${output}" ./cmd/gopher
          sha256sum "${output}" > "${output}.sha256"

      - name: upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            out/gopher-${{ matrix.goos }}-${{ matrix.goarch }}
            out/gopher-${{ matrix.goos }}-${{ matrix.goarch }}.sha256
          if-no-files-found: error

  release:
    name: publish-release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - name: download artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist

      - name: prepare release files
        run: |
          mkdir -p release
          find dist -type f -name 'gopher-*' ! -name '*.sha256' -exec cp {} release/ \;
          find dist -type f -name 'gopher-*.sha256' -print | sort | xargs cat > release/checksums.txt

      - name: create github release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: |
            release/*
